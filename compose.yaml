services:
  pi:
    image: ghcr.io/phate334/uv-pi:0.80.6
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
      - uv-pi-venv:/workspace/.venv
      - uv-pi-cache:/root/.cache/uv
      - ./.pi:/root/.pi

  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-b9853
    ports:
      - "8080:8080"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      LLAMA_ARG_HF_REPO: unsloth/gemma-4-E2B-it-qat-GGUF:UD-Q4_K_XL
      LLAMA_ARG_ALIAS: gemma-4-e2b
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_CTX_SIZE: 32768
      LLAMA_ARG_N_PARALLEL: 1
      LLAMA_ARG_CACHE_TYPE_K: q8_0
      LLAMA_ARG_CACHE_TYPE_V: q8_0
    volumes:
      - llm-cache:/root/.cache

volumes:
  uv-pi-venv:
  uv-pi-cache:
  llm-cache:
