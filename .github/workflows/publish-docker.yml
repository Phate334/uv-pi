name: Publish uv-pi image

on:
  workflow_dispatch:
    inputs:
      pi_agent_version:
        description: "pi coding agent version to install and use as the image tag"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      ghcr_owner: ${{ steps.vars.outputs.ghcr_owner }}
      image_name: ${{ steps.vars.outputs.image_name }}
      pi_agent_version: ${{ steps.vars.outputs.pi_agent_version }}
    steps:
      - name: Normalize variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          pi_agent_version="${{ inputs.pi_agent_version }}"
          if [[ -z "${pi_agent_version}" ]]; then
            echo "pi_agent_version is required" >&2
            exit 1
          fi
          echo "ghcr_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/uv-pi" >> "$GITHUB_OUTPUT"
          echo "pi_agent_version=${pi_agent_version}" >> "$GITHUB_OUTPUT"

  build-amd64:
    runs-on: ubuntu-24.04
    needs: prepare
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ needs.prepare.outputs.ghcr_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            PI_AGENT_VERSION=${{ needs.prepare.outputs.pi_agent_version }}
          outputs: type=image,name=${{ needs.prepare.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=uv-pi-amd64
          cache-to: type=gha,mode=max,scope=uv-pi-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: prepare
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ needs.prepare.outputs.ghcr_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          build-args: |
            PI_AGENT_VERSION=${{ needs.prepare.outputs.pi_agent_version }}
          outputs: type=image,name=${{ needs.prepare.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=uv-pi-arm64
          cache-to: type=gha,mode=max,scope=uv-pi-arm64

  publish-manifest:
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - build-amd64
      - build-arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ needs.prepare.outputs.ghcr_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify amd64 and arm64 digests exist
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ needs.prepare.outputs.image_name }}@${{ needs.build-amd64.outputs.digest }}" > /dev/null
          docker buildx imagetools inspect "${{ needs.prepare.outputs.image_name }}@${{ needs.build-arm64.outputs.digest }}" > /dev/null

      - name: Create multi-arch manifest tag
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.pi_agent_version }}" \
            "${{ needs.prepare.outputs.image_name }}@${{ needs.build-amd64.outputs.digest }}" \
            "${{ needs.prepare.outputs.image_name }}@${{ needs.build-arm64.outputs.digest }}"

      - name: Verify final manifest platforms
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.pi_agent_version }}"